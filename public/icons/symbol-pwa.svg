<!-- PWA OS 홈 아이콘 전용 SVG — 사용자 결정 (2026-05-21):
     "PWA OS 아이콘은 원이 없는, 청색 사각 배경 + 흰 tt: 글자만. OS 가 자체 마스크
     (둥근사각/원형/스쿼클) 로 디바이스 모양에 맞게 잘라서 표시".

     - circle 제거 (원 디자인 아님)
     - 청색 사각 배경: sharp 의 background:"#4CBFF2" 가 책임 (SVG 는 투명)
     - 흰 tt: 글자만 + 위치 보정 (translate 0.39 2.34) + 원래 원 중심 기준 scale(1.4).
       글씨가 캔버스 가운데에 정확히 + 폭 약 81% (어떤 OS 마스크에도 잘림 0).
     - viewBox 는 원본과 동일 (좌표 호환). -->

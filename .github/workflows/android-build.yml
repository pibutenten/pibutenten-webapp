name: Android Build (APK)

# 피부텐텐 Android 앱 클라우드 빌드 (앱스토어 Phase 6).
#   로컬에 Android SDK/JDK 가 없어 GitHub Actions(ubuntu)에서 APK 를 빌드한다.
#   원격 로드 방식(server.url=pibutenten.kr)이라 Next 빌드 불필요 — Capacitor 셸만 빌드.
#   산출물(app-debug.apk)은 Actions artifact 로 다운로드 → 실기기 직접 설치/배포.

on:
  workflow_dispatch: {} # 수동 실행(Actions 탭 → Run workflow)
  push:
    branches: [main]
    paths:
      - "android/**"
      - "native/**"
      - "capacitor.config.ts"
      - ".github/workflows/android-build.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (Capacitor CLI 포함)
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pibutenten-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

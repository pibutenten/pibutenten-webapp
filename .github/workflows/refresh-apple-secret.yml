name: Refresh Apple Sign-in Secret

# Apple Client Secret(JWT)은 최대 6개월만 유효하다.
# 매월 1일 자동 재발급 + 수동 실행(workflow_dispatch) 지원.
# 비밀값은 전부 GitHub Secrets 로만 주입한다.

on:
  schedule:
    - cron: "0 3 1 * *" # 매월 1일 03:00 UTC (KST 12:00)
  workflow_dispatch: {} # Actions 탭에서 수동 실행 버튼

permissions:
  contents: read

concurrency:
  group: refresh-apple-secret
  # 수동·자동 실행이 겹쳐도 secret 갱신은 멱등적(마지막 값이 유효)이라 취소하지 않음
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate JWT and update Supabase
        env:
          APPLE_SIGNIN_KEY: ${{ secrets.APPLE_SIGNIN_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_SERVICES_ID: ${{ secrets.APPLE_SERVICES_ID }}
          APPLE_NATIVE_BUNDLE_ID: ${{ secrets.APPLE_NATIVE_BUNDLE_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/refresh-apple-secret.mjs

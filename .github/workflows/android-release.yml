name: Android Release (AAB)

# 피부텐텐 Android 릴리스 빌드 (앱스토어 Phase 6 — Play 내부테스트/정식).
#   서명된 AAB(Android App Bundle)를 만들어 Play Console 업로드용으로 산출한다.
#   debug APK(android-build.yml)와 별개 — 이쪽은 릴리스 키스토어로 서명한 배포본.
#   원격 로드 방식(server.url=pibutenten.kr)이라 Next 빌드 불필요 — Capacitor 셸만 빌드.
#   macOS 불필요(ubuntu). 수동 실행만.
#
#   필요한 GitHub Secrets:
#     ANDROID_KEYSTORE_BASE64    — pibutenten-release.p12 의 base64
#     ANDROID_KEYSTORE_PASSWORD  — 키스토어 비밀번호
#     ANDROID_KEY_ALIAS          — pibutenten
#     ANDROID_KEY_PASSWORD       — 키 비밀번호(PKCS12 라 키스토어와 동일)

on:
  workflow_dispatch: {}

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (Capacitor CLI 포함)
        run: npm ci

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.p12"

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Build release AAB (signed)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pibutenten-android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
